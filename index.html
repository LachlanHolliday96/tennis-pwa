<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tennis Plan">
<meta name="theme-color" content="#0d0d0f">
<title>Lachie's Tennis Plan</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230d0d0f'/><text y='.9em' font-size='72' x='12'>🎾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>

<div id="touch-ghost"></div>

<div id="navbar">
  <div class="nb-inner">
    <div class="nb-title">🎾 <span>Tennis</span></div>
    <div class="nb-right">
      <div style="display:flex;align-items:center;gap:5px">
        <div id="sync-dot" title="Sync status"></div>
      </div>
      <div class="nb-streak" id="streak-badge">🔥 <span id="streak-num">0</span></div>
      <div class="nb-progress">
        <div class="nb-pbar"><div class="nb-pfill" id="nb-pfill" style="width:0%"></div></div>
        <div style="font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted)" id="nb-ptxt">0/0</div>
      </div>
    </div>
  </div>
</div>

<div class="screen active" id="screen-today"></div>
<div class="screen" id="screen-schedule"></div>
<div class="screen" id="screen-analysis"></div>
<div class="screen" id="screen-progress"></div>
<div class="screen" id="screen-gym"></div>

<div id="tabbar">
  <button class="tbtn active" id="tab-today">
    <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 017 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 017-7zm0 4.5a2.5 2.5 0 100 5 2.5 2.5 0 000-5z"/></svg>
    <span>Today</span>
  </button>
  <button class="tbtn" id="tab-schedule">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/></svg>
    <span>Schedule</span>
  </button>
  <button class="tbtn" id="tab-analysis">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>Analysis</span>
  </button>
  <button class="tbtn" id="tab-progress">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    <span>Progress</span>
  </button>
  <button class="tbtn" id="tab-gym">
    <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11M6.5 17.5h11M4 10h2v4H4zM18 10h2v4h-2zM2 11.5h2M20 11.5h2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    <span>Gym</span>
  </button>
</div>

<!-- DETAIL SHEET -->
<div class="sheet-bg" id="sheet-bg">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hd">
      <div><div class="sheet-title" id="sheet-title"></div><div class="sheet-date" id="sheet-date"></div></div>
      <button class="sheet-close" id="sheet-close">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
    <div class="sheet-actions" id="sheet-actions"></div>
  </div>
</div>

<!-- FEEL SHEET -->
<div class="feel-sheet-bg" id="feel-bg">
  <div class="feel-sheet">
    <div class="sheet-handle"></div>
    <h3 id="feel-title">How did it go?</h3>
    <div class="feel-options">
      <button class="feel-opt Easy" id="feel-Easy">😌 Easy</button>
      <button class="feel-opt Solid" id="feel-Solid">💪 Solid</button>
      <button class="feel-opt Hard" id="feel-Hard">🔥 Hard</button>
      <button class="feel-opt Skipped" id="feel-Skipped">⏭ Skipped</button>
    </div>
    <textarea class="feel-note" id="feel-note" placeholder="Quick note (optional)"></textarea>
    <button class="feel-save" id="feel-save">Save</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="edit-bg" id="edit-bg">
  <div class="edit-modal">
    <div class="edit-hd">
      <h3 id="edit-title">Edit session</h3>
      <button class="edit-close" id="edit-close">✕</button>
    </div>
    <div class="ef"><label>Name</label><input id="e-name" type="text"></div>
    <div class="ef"><label>Short label</label><input id="e-short" type="text" maxlength="12"></div>
    <div class="ef"><label>Type</label>
      <select id="e-type">
        <option value="s-tennis">Tennis</option>
        <option value="s-cardio">Cardio</option>
        <option value="s-gym">Gym</option>
        <option value="s-hill">Hill sprints</option>
        <option value="s-hotel">Travel / Hotel</option>
        <option value="s-rest">Rest</option>
      </select>
    </div>
    <div class="ef"><label>Pill label</label><input id="e-pill" type="text" maxlength="14"></div>
    <div class="ef"><label>Session blocks</label>
      <div class="block-ed" id="block-ed"></div>
      <button class="add-block-btn" id="add-block-btn">+ Add block</button>
    </div>
    <div class="edit-btns">
      <button class="eb save" id="edit-save">Save</button>
      <button class="eb del" id="edit-del">Remove</button>
    </div>
  </div>
</div>

<!-- INFO SHEET -->
<div class="info-sheet-bg" id="info-sheet-bg">
  <div class="info-sheet" id="info-sheet">
    <div class="is-handle"></div>
    <div class="is-hero">
      <div class="is-hero-left">
        <div class="is-ex-name" id="is-name"></div>
        <div class="is-ex-target" id="is-target"></div>
      </div>
      <button class="is-close" id="is-close">✕</button>
    </div>
    <div class="is-section">
      <div class="is-section-label" style="color:var(--a2)">How to do it</div>
      <div class="is-section-body" id="is-how"></div>
    </div>
    <div class="is-section">
      <div class="is-section-label" style="color:var(--accent)">The cue</div>
      <div class="is-cue-box" id="is-cue"></div>
    </div>
    <div class="is-section">
      <div class="is-section-label" style="color:var(--gym)">What it trains</div>
      <div class="is-section-body" id="is-trains"></div>
    </div>
    <div class="is-section">
      <div class="is-section-label" style="color:var(--a4)">Watch out for</div>
      <div id="is-injury"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
